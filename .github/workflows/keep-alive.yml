name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 8 * * *'  # Tous les jours à 8h UTC
  workflow_dispatch:      # Lancement manuel possible depuis GitHub Actions

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ]; then
            echo "ERREUR: secrets SUPABASE_URL et/ou SUPABASE_SERVICE_ROLE_KEY non configurés dans GitHub"
            exit 1
          fi

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
            "$SUPABASE_URL/rest/v1/reservations?select=id&limit=1" \
            -H "apikey: $SUPABASE_KEY" \
            -H "Authorization: Bearer $SUPABASE_KEY")

          echo "HTTP status: $STATUS"

          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]; then
            echo "Supabase actif - $(date -u)"
          else
            echo "ERREUR: Supabase a retourné HTTP $STATUS"
            exit 1
          fi
